<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">RAAS exposure estimate across Cox model specifications</title>
  <desc id="desc">Forest-style plot comparing hazard ratio estimates for pre-ICU RAAS exposure across primary refined Cox, extended core, penalized core, ICU-type adjusted, and ICU-type penalized models.</desc>
  <rect width="980" height="620" fill="#ffffff"/>
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1f2933">RAAS exposure estimate across Cox model specifications</text>
  <text x="60" y="78" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5563">Existing 04a/04c reported hazard ratios and 95% confidence intervals</text>

  <line x1="390" y1="115" x2="790" y2="115" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="390" y1="455" x2="790" y2="455" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="390" y1="115" x2="390" y2="455" stroke="#263238" stroke-width="1"/>
  <line x1="790" y1="115" x2="790" y2="455" stroke="#cfd8dc" stroke-width="1"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52616b">
    <line x1="390" y1="455" x2="390" y2="462" stroke="#52616b"/>
    <text x="390" y="481" text-anchor="middle">0.5</text>
    <line x1="490" y1="455" x2="490" y2="462" stroke="#52616b"/>
    <text x="490" y="481" text-anchor="middle">0.7</text>
    <line x1="590" y1="455" x2="590" y2="462" stroke="#52616b"/>
    <text x="590" y="481" text-anchor="middle">0.9</text>
    <line x1="690" y1="455" x2="690" y2="462" stroke="#52616b"/>
    <text x="690" y="481" text-anchor="middle">1.1</text>
    <line x1="790" y1="455" x2="790" y2="462" stroke="#52616b"/>
    <text x="790" y="481" text-anchor="middle">1.3</text>
  </g>

  <line x1="640" y1="115" x2="640" y2="455" stroke="#444444" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="648" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#444444">HR = 1.0</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2933" stroke-linecap="round">
    <text x="60" y="152">Primary refined Cox</text>
    <text x="60" y="171" fill="#52616b" font-size="12">age/sex; era-stratified</text>
    <line x1="430" y1="155" x2="580" y2="155" stroke="#5f7f8f" stroke-width="3"/>
    <line x1="430" y1="148" x2="430" y2="162" stroke="#5f7f8f" stroke-width="2"/>
    <line x1="580" y1="148" x2="580" y2="162" stroke="#5f7f8f" stroke-width="2"/>
    <circle cx="495" cy="155" r="6" fill="#1f4e5f"/>
    <text x="815" y="160">0.710 (0.580-0.880)</text>

    <text x="60" y="220">Extended core Cox</text>
    <text x="60" y="239" fill="#52616b" font-size="12">severity + comorbidity</text>
    <line x1="467" y1="223" x2="640" y2="223" stroke="#5f7f8f" stroke-width="3"/>
    <line x1="467" y1="216" x2="467" y2="230" stroke="#5f7f8f" stroke-width="2"/>
    <line x1="640" y1="216" x2="640" y2="230" stroke="#5f7f8f" stroke-width="2"/>
    <circle cx="545" cy="223" r="6" fill="#1f4e5f"/>
    <text x="815" y="228">0.809 (0.654-1.000)</text>

    <text x="60" y="288">Penalized extended core</text>
    <text x="60" y="307" fill="#52616b" font-size="12">L2 penalizer = 0.1</text>
    <line x1="521" y1="291" x2="649" y2="291" stroke="#5f7f8f" stroke-width="3"/>
    <line x1="521" y1="284" x2="521" y2="298" stroke="#5f7f8f" stroke-width="2"/>
    <line x1="649" y1="284" x2="649" y2="298" stroke="#5f7f8f" stroke-width="2"/>
    <circle cx="580" cy="291" r="6" fill="#1f4e5f"/>
    <text x="815" y="296">0.880 (0.761-1.017)</text>

    <text x="60" y="356">ICU-type adjusted</text>
    <text x="60" y="375" fill="#52616b" font-size="12">extended model</text>
    <line x1="519" y1="359" x2="723" y2="359" stroke="#5f7f8f" stroke-width="3"/>
    <line x1="519" y1="352" x2="519" y2="366" stroke="#5f7f8f" stroke-width="2"/>
    <line x1="723" y1="352" x2="723" y2="366" stroke="#5f7f8f" stroke-width="2"/>
    <circle cx="610" cy="359" r="6" fill="#1f4e5f"/>
    <text x="815" y="364">0.940 (0.758-1.166)</text>

    <text x="60" y="424">ICU-type adjusted + L2</text>
    <text x="60" y="443" fill="#52616b" font-size="12">penalizer = 0.01</text>
    <line x1="515" y1="427" x2="688" y2="427" stroke="#5f7f8f" stroke-width="3"/>
    <line x1="515" y1="420" x2="515" y2="434" stroke="#5f7f8f" stroke-width="2"/>
    <line x1="688" y1="420" x2="688" y2="434" stroke="#5f7f8f" stroke-width="2"/>
    <circle cx="588" cy="427" r="6" fill="#1f4e5f"/>
    <text x="815" y="432">0.895 (0.730-1.096)</text>
  </g>

  <text x="590" y="522" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263238">Hazard ratio for pre-ICU RAAS exposure (95% CI)</text>
  <text x="60" y="565" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Interpretation: estimates remained below 1.0 but moved toward the null and crossed 1.0 after penalization or ICU-type adjustment.</text>
  <text x="60" y="587" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Values are existing 04a/04c outputs; this comparison is descriptive and does not establish causality.</text>
</svg>
