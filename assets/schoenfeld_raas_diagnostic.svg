<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Proportional hazards diagnostic for pre-ICU RAAS exposure</title>
  <desc id="desc">Horizontal bar chart of Schoenfeld residual test p-values for the RAAS exposure term in the primary Cox, extended core, and ICU-extended models. All p-values are greater than 0.05.</desc>
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="60" y="50" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1f2933">Proportional hazards diagnostic for pre-ICU RAAS exposure</text>
  <text x="60" y="78" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5563">Schoenfeld residual test p-values from existing 04a and 04c notebook outputs</text>

  <line x1="260" y1="115" x2="800" y2="115" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="260" y1="360" x2="800" y2="360" stroke="#cfd8dc" stroke-width="1"/>
  <line x1="260" y1="115" x2="260" y2="360" stroke="#263238" stroke-width="1"/>
  <line x1="800" y1="115" x2="800" y2="360" stroke="#cfd8dc" stroke-width="1"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52616b">
    <line x1="260" y1="360" x2="260" y2="367" stroke="#52616b"/>
    <text x="256" y="386" text-anchor="middle">0.0</text>
    <line x1="368" y1="360" x2="368" y2="367" stroke="#52616b"/>
    <text x="368" y="386" text-anchor="middle">0.2</text>
    <line x1="476" y1="360" x2="476" y2="367" stroke="#52616b"/>
    <text x="476" y="386" text-anchor="middle">0.4</text>
    <line x1="584" y1="360" x2="584" y2="367" stroke="#52616b"/>
    <text x="584" y="386" text-anchor="middle">0.6</text>
    <line x1="692" y1="360" x2="692" y2="367" stroke="#52616b"/>
    <text x="692" y="386" text-anchor="middle">0.8</text>
    <line x1="800" y1="360" x2="800" y2="367" stroke="#52616b"/>
    <text x="800" y="386" text-anchor="middle">1.0</text>
  </g>

  <line x1="287" y1="115" x2="287" y2="360" stroke="#9b2226" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="294" y="132" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#9b2226">p = 0.05</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1f2933">
    <text x="60" y="165">Primary Cox</text>
    <text x="60" y="184" fill="#52616b" font-size="13">(04a)</text>
    <rect x="260" y="145" width="182" height="38" fill="#3b6f8f"/>
    <text x="454" y="169" fill="#1f2933" font-size="14">0.337</text>

    <text x="60" y="245">Extended core</text>
    <text x="60" y="264" fill="#52616b" font-size="13">(04c)</text>
    <rect x="260" y="225" width="483" height="38" fill="#6f8f3b"/>
    <text x="755" y="249" fill="#1f2933" font-size="14">0.894</text>

    <text x="60" y="325">ICU-extended</text>
    <text x="60" y="344" fill="#52616b" font-size="13">(04c)</text>
    <rect x="260" y="305" width="355" height="38" fill="#8f6f3b"/>
    <text x="627" y="329" fill="#1f2933" font-size="14">0.657</text>
  </g>

  <text x="530" y="422" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#263238">Schoenfeld residual test p-value for RAAS exposure</text>
  <text x="60" y="470" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563">Interpretation: none of the displayed RAAS exposure tests showed evidence of proportional hazards violation at p &lt; 0.05.</text>
  <text x="60" y="492" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Values are copied from existing notebook outputs; this diagnostic does not introduce a new model.</text>
</svg>
